# Pushed to heavy forwarders only (server class: heavy_forwarders).
# HFs run full Splunk — they can parse, filter, and route before forwarding.

[default]
host = $decideOnStartup

[monitor:///var/log]
disabled = false
index = main

[http]
disabled = 0
enableSSL = 1
port = 8088

[http://hf_collector]
disabled = 0
index = main
token = REPLACE_WITH_HEC_TOKEN
