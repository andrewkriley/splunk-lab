# Pushed to universal forwarders only (server class: universal_forwarders).
# UFs forward raw events — no parsing. Add monitor stanzas for hosts in this class.

[default]
host = $decideOnStartup

[monitor:///var/log]
disabled = false
index = main
whitelist = \.log$|messages$|syslog$

[monitor:///var/log/secure]
disabled = false
index = security
sourcetype = linux_secure
