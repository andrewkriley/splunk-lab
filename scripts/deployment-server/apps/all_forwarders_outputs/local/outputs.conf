# Pushed to every forwarder (UF + HF) via the 'all_forwarders' server class.
# Points every forwarder at this lab's Splunk instance on the receiving port.
# Override 'server' on real deployments to point at your indexer tier / cluster.

[tcpout]
defaultGroup = primary_indexers
forwardedindex.filter.disable = true
indexAndForward = false

[tcpout:primary_indexers]
server = splunk:9997
useACK = true

[tcpout-server://splunk:9997]
