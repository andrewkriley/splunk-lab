# Drop this file into $SPLUNK_HOME/etc/system/local/deploymentclient.conf on
# each forwarder, then restart the forwarder. The clientName prefix controls
# which server classes in serverclass.conf will match this host:
#   - uf-*   → universal_forwarders (plus all_forwarders)
#   - hf-*   → heavy_forwarders    (plus all_forwarders)

[deployment-client]
clientName = uf-REPLACE-ME

[target-broker:deploymentServer]
targetUri = DEPLOYMENT_SERVER_HOST:8089
