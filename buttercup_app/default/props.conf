# Tell Splunk how to parse the CSV files — first row is the header

[buttercup_sales]
INDEXED_EXTRACTIONS = csv
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d
MAX_TIMESTAMP_LOOKAHEAD = 10

[buttercup_products]
INDEXED_EXTRACTIONS = csv

# Apache Combined log format — custom sourcetype avoids conflicts with
# Splunk's built-in access_combined processing in the Docker image.
[buttercup_web]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
DATETIME_CONFIG = CURRENT
KV_MODE = none
EXTRACT-apache = ^(?P<clientip>\S+)\s+\S+\s+\S+\s+\[(?P<date>[^\]]+)\]\s+"(?P<method>\w+)\s+(?P<uri>\S+)\s+\S+"\s+(?P<status>\d+)\s+(?P<bytes>\S+)\s+"(?P<referer>[^"]*)"\s+"(?P<useragent>[^"]*)"
