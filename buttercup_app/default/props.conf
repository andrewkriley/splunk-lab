# Tell Splunk how to parse the CSV files — first row is the header

[buttercup_sales]
INDEXED_EXTRACTIONS = csv
FIELD_HEADER_REGEX = 0

[buttercup_products]
INDEXED_EXTRACTIONS = csv
FIELD_HEADER_REGEX = 0

# Explicit timestamp config for Apache Combined log format.
# Overrides built-in defaults so behaviour is consistent in the Docker image.
[access_combined]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = \[
TIME_FORMAT = %d/%b/%Y:%H:%M:%S %z
MAX_TIMESTAMP_LOOKAHEAD = 28
KV_MODE = none
