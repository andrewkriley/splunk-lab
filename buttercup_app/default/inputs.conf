# Splunk will start monitoring these files automatically when the app loads.
# Data is indexed into the 'main' index for easy access in searches.

[monitor:///opt/splunk/etc/apps/buttercup_app/data/access.log]
disabled = false
index = main
sourcetype = access_combined
# Web access logs from the Buttercup Games storefront

[monitor:///opt/splunk/etc/apps/buttercup_app/data/vendor_sales.csv]
disabled = false
index = main
sourcetype = buttercup_sales
# Vendor sales transactions — revenue, units, product breakdown

[monitor:///opt/splunk/etc/apps/buttercup_app/data/products.csv]
disabled = false
index = main
sourcetype = buttercup_products
# Product catalogue with prices and categories
