server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # Proxy status API requests to the status-api container
    location /api/status {
        proxy_pass         http://status-api:8081/api/status;
        proxy_read_timeout 5s;
        proxy_connect_timeout 2s;
        add_header         Cache-Control "no-cache, no-store";
    }

    # Ask Splunk — API proxied to chat backend (same origin as lab guide)
    location /ask/api/ {
        proxy_pass         http://chat:3000/api/;
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "no-cache, no-store";
    }

    location = /ask {
        return 302 /ask/;
    }

    location /ask/ {
        alias /usr/share/nginx/html/ask/;
        index index.html;
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
