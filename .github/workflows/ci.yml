name: CI

on:
  push:
    branches:
      - 'feat/**'
  pull_request:
    branches:
      - main

jobs:

  # ── Per-platform integration tests ──────────────────────────────────────────
  # Runs on:
  #   ubuntu-latest      — x86_64 (validates Linux + Windows users natively)
  #   ubuntu-24.04-arm   — arm64  (validates Apple Silicon / ARM users via amd64 emulation)
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false          # let both platforms complete even if one fails
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU enables amd64 emulation on the arm64 runner.
      # Splunk only publishes linux/amd64 — this is what makes it run on ARM.
      # Safe to run on amd64 too (no-op for native platforms).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Create .env from the example — default credentials are safe for CI
      - name: Create .env
        run: cp .env.example .env

      # Build the MCP server image and start both containers
      - name: Start stack
        run: docker compose up -d --build

      # Splunk takes ~60–90s on amd64; up to 10 min on arm64 via QEMU emulation.
      # Poll every 10s up to 600s total.
      - name: Wait for Splunk
        run: |
          echo "Waiting for Splunk (up to 600s)..."
          for i in $(seq 1 60); do
            curl -sf http://localhost:8000/en-US/account/login > /dev/null && echo "Splunk ready after $((i*10))s" && break
            echo "  waiting... ($((i*10))s)"
            sleep 10
          done

      # MCP container starts after Splunk is healthy — give it a moment to bind
      - name: Wait for MCP server
        run: |
          echo "Waiting for MCP server..."
          for i in $(seq 1 20); do
            nc -z localhost 8050 2>/dev/null && echo "MCP ready after $((i*3))s" && break
            echo "  waiting... ($((i*3))s)"
            sleep 3
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v

      # Always tear down — clean up volumes so the runner stays tidy
      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── Summary gate ────────────────────────────────────────────────────────────
  # This job is the one required by branch protection.
  # It passes only when ALL matrix jobs pass, giving a single named check
  # regardless of how many platforms are in the matrix.
  integration-tests:
    name: Integration tests
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All platform tests passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more platform tests failed."
            exit 1
          fi
          echo "All platform tests passed."
