name: CI

on:
  pull_request:
    branches:
      - main

jobs:

  # ── Integration tests ────────────────────────────────────────────────────────
  # Runs on ubuntu-latest (amd64).
  # Apple Silicon (arm64) is validated locally — QEMU emulation is not
  # representative of Docker Desktop + Rosetta and adds flakiness.
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Create .env from the example — default credentials are safe for CI
      - name: Create .env
        run: cp .env.example .env

      # Build the MCP server image and start both containers
      - name: Start stack
        run: docker compose up -d --build

      # Splunk takes ~60–90s on first boot; allow up to 180s.
      - name: Wait for Splunk
        run: |
          echo "Waiting for Splunk (up to 180s)..."
          for i in $(seq 1 18); do
            curl -sf http://localhost:8000/en-US/account/login > /dev/null && echo "Splunk ready after $((i*10))s" && break
            echo "  waiting... ($((i*10))s)"
            sleep 10
          done

      # MCP container starts after Splunk is healthy — give it a moment to bind
      - name: Wait for MCP server
        run: |
          echo "Waiting for MCP server..."
          for i in $(seq 1 20); do
            nc -z localhost 8050 2>/dev/null && echo "MCP ready after $((i*3))s" && break
            echo "  waiting... ($((i*3))s)"
            sleep 3
          done

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v

      # Always tear down — clean up volumes so the runner stays tidy
      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── Version bump check ──────────────────────────────────────────────────────
  # Ensures VERSION is bumped on every PR so releases stay in sync.
  version-bump:
    name: Version bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check VERSION was bumped
        run: |
          BASE=$(git show origin/${{ github.base_ref }}:VERSION)
          HEAD=$(cat VERSION)
          echo "Base VERSION: $BASE"
          echo "PR VERSION:   $HEAD"
          if [ "$BASE" = "$HEAD" ]; then
            echo "ERROR: VERSION file was not updated. Bump it before merging."
            exit 1
          fi
          echo "✓ VERSION bumped: $BASE → $HEAD"

  # ── Summary gate ────────────────────────────────────────────────────────────
  # Single named check required by branch protection.
  integration-tests:
    name: Integration tests
    needs: [test, version-bump]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Integration tests failed."
            exit 1
          fi
          if [ "${{ needs.version-bump.result }}" != "success" ]; then
            echo "Version bump check failed."
            exit 1
          fi
          echo "All checks passed."
