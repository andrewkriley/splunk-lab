name: CI

on:
  push:
    branches:
      - 'feat/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Create .env from the example — default credentials are safe for CI
      - name: Create .env
        run: cp .env.example .env

      # Build the MCP server image and start both containers
      - name: Start stack
        run: docker compose up -d --build

      # Splunk takes ~60–90s on first boot — poll until the login page responds
      - name: Wait for Splunk
        run: |
          echo "Waiting for Splunk to be ready..."
          timeout 180 bash -c \
            'until curl -sf http://localhost:8000/en-US/account/login > /dev/null; do
               echo "  still waiting..."; sleep 5
             done'
          echo "Splunk is ready."

      # Give the MCP container a moment to connect to Splunk after it starts
      - name: Wait for MCP server
        run: |
          echo "Waiting for MCP server..."
          timeout 60 bash -c \
            'until nc -z localhost 8050 2>/dev/null; do
               echo "  still waiting..."; sleep 3
             done'
          echo "MCP server is ready."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v

      # Always tear down — clean up volumes so the runner stays tidy
      - name: Tear down
        if: always()
        run: docker compose down -v
