name: CI

on:
  pull_request:
    branches:
      - main

jobs:

  # ── Integration tests ────────────────────────────────────────────────────────
  # Runs on ubuntu-latest (amd64).
  # Apple Silicon (arm64) is validated locally — QEMU emulation is not
  # representative of Docker Desktop + Rosetta and adds flakiness.
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Create .env from the example — default credentials are safe for CI
      - name: Create .env
        run: cp .env.example .env

      # Build the MCP server image and start both containers
      - name: Start stack
        run: docker compose up -d --build

      # Splunk takes ~60–90s on first boot; allow up to 180s.
      - name: Wait for Splunk
        run: |
          echo "Waiting for Splunk (up to 180s)..."
          for i in $(seq 1 18); do
            curl -sf http://localhost:8000/en-US/account/login > /dev/null && echo "Splunk ready after $((i*10))s" && break
            echo "  waiting... ($((i*10))s)"
            sleep 10
          done

      # MCP container starts after Splunk is healthy — give it a moment to bind
      - name: Wait for MCP server
        run: |
          echo "Waiting for MCP server..."
          for i in $(seq 1 20); do
            nc -z localhost 8050 2>/dev/null && echo "MCP ready after $((i*3))s" && break
            echo "  waiting... ($((i*3))s)"
            sleep 3
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      # Dump indexed event counts by sourcetype — helps diagnose indexing issues
      - name: Splunk index diagnostic
        if: always()
        run: |
          PASS=$(grep SPLUNK_PASSWORD .env | cut -d= -f2)
          curl -sk -u admin:$PASS \
            "https://localhost:8089/services/search/jobs" \
            -d "search=search index=* earliest=0 | stats count by index sourcetype | sort -count" \
            -d "output_mode=json" -d "exec_mode=oneshot" \
            -d "earliest_time=0" -d "latest_time=now" | python3 -c "
import sys, json
data = json.load(sys.stdin)
for r in data.get('results', []):
    print(f\"  {r.get('index','?'):20} {r.get('sourcetype','?'):30} {r.get('count','?')}\")"

      - name: Run tests
        run: pytest tests/ -v

      # Always tear down — clean up volumes so the runner stays tidy
      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── Summary gate ────────────────────────────────────────────────────────────
  # Single named check required by branch protection.
  integration-tests:
    name: Integration tests
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Integration tests failed."
            exit 1
          fi
          echo "Integration tests passed."
