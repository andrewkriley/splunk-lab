name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Verify VERSION file matches tag
        run: |
          FILE_VERSION=$(cat VERSION)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ VERSION file matches tag: $TAG_VERSION"

      - name: Create .env
        run: cp .env.example .env

      - name: Build Docker images with version tags
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Build status-api with version tag
          docker build \
            -t splunk-lab-status-api:${VERSION} \
            -t splunk-lab-status-api:latest \
            -f status-api/Dockerfile .

          # Build splunk-mcp with version tag
          docker build \
            -t splunk-lab-mcp:${VERSION} \
            -t splunk-lab-mcp:latest \
            -f mcp/Dockerfile .

      - name: Create release archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          tar -czf splunk-lab-${VERSION}.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.tar.gz' \
            .

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "${{ steps.version.outputs.tag }}" | tail -1)

          if [ -z "$PREV_TAG" ]; then
            # First release - use all commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits since previous tag
            CHANGELOG=$(git log ${PREV_TAG}..${{ steps.version.outputs.tag }} --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Save changelog to file for release notes
          echo "$CHANGELOG" > CHANGELOG.txt
          echo "Generated changelog:"
          cat CHANGELOG.txt

      - name: Update CHANGELOG.md
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DATE=$(date +%Y-%m-%d)

          # Build the new section
          {
            echo "## ${TAG} — ${DATE}"
            echo ""
            cat CHANGELOG.txt
            echo ""
          } > new_section.txt

          if [ -f CHANGELOG.md ]; then
            # Preserve the header line, insert new section after it
            head -1 CHANGELOG.md > updated_changelog.md
            echo "" >> updated_changelog.md
            cat new_section.txt >> updated_changelog.md
            tail -n +2 CHANGELOG.md >> updated_changelog.md
          else
            echo "# Changelog" > updated_changelog.md
            echo "" >> updated_changelog.md
            cat new_section.txt >> updated_changelog.md
          fi

          mv updated_changelog.md CHANGELOG.md
          echo "Updated CHANGELOG.md:"
          cat CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body_path: CHANGELOG.txt
          files: splunk-lab-${{ steps.version.outputs.version }}.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit CHANGELOG.md to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "Update CHANGELOG.md for ${{ steps.version.outputs.tag }} [skip ci]"
          git push origin HEAD:refs/heads/main

      - name: Update latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest
