name: splunk-lab

services:

  # ── Splunk Enterprise ──────────────────────────────────────────────────────
  splunk:
    image: splunk/splunk:10.2.1
    platform: linux/amd64       # Splunk publishes amd64 only — runs via Rosetta on Apple Silicon
    container_name: splunk
    hostname: splunk
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_GENERAL_TERMS: --accept-sgt-current-at-splunk-com   # required by newer Splunk images
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}          # set in .env — required
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN}        # pre-set HEC token for easy testing
    ports:
      # All ports bound to 127.0.0.1 — accessible from this machine only
      - "127.0.0.1:8000:8000"   # Splunk Web UI
      - "127.0.0.1:8088:8088"   # HTTP Event Collector (HEC)
      - "127.0.0.1:8089:8089"   # Splunk REST / management API
    volumes:
      - splunk-var:/opt/splunk/var                                          # persist indexes across restarts
      - ./buttercup_app:/opt/splunk/etc/apps/buttercup_app                  # Buttercup sample data app
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/en-US/account/login"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s    # Splunk takes ~60s on first boot; longer on amd64-via-emulation on arm
    deploy:
      resources:
        limits:
          memory: 4g       # Splunk minimum; increase to 8g for heavier workloads
        reservations:
          memory: 2g

  # ── Splunk MCP Server ──────────────────────────────────────────────────────
  splunk-mcp:
    build:
      context: ./mcp
      tags:
        - splunk-mcp:latest
    container_name: splunk-mcp
    environment:
      TRANSPORT: sse
      HOST: 0.0.0.0
      PORT: 8050
      SPLUNK_HOST: splunk                             # hostname only — SplunkClient prepends https://
      SPLUNK_PORT: 8089                            # Splunk REST API port
      SPLUNK_USERNAME: admin
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      VERIFY_SSL: "false"                          # self-signed cert on local Splunk instance
      NODE_TLS_REJECT_UNAUTHORIZED: "0"            # Node.js SSL bypass for self-signed Splunk cert
    ports:
      - "127.0.0.1:8050:8050"   # MCP SSE endpoint — localhost only, no auth required
    restart: unless-stopped                        # restart if the process exits unexpectedly
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      splunk:
        condition: service_started                 # don't block on health — CI wait step handles readiness

  # ── Lab Guide ──────────────────────────────────────────────────────────────
  lab-guide:
    image: nginx:alpine
    container_name: lab-guide
    ports:
      - "127.0.0.1:${LAB_GUIDE_PORT:-3131}:80"   # Lab guide + Ask Splunk UI — localhost only
    volumes:
      - ./lab-guide:/usr/share/nginx/html:ro
      - ./lab-guide/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - status-api
      - chat
    deploy:
      resources:
        limits:
          memory: 64m

  # ── Status API ─────────────────────────────────────────────────────────────
  status-api:
    build:
      context: .
      dockerfile: status-api/Dockerfile
    container_name: status-api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # read-only docker access for container checks
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m

  # ── Ask Splunk Chat ────────────────────────────────────────────────────────
  chat:
    build:
      context: ./chat
    container_name: chat
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MCP_SSE_URL: http://splunk-mcp:8050/sse
    expose:
      - "3000"   # internal only — lab-guide nginx proxies /ask/api/* here
    depends_on:
      - splunk-mcp
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  splunk-var:    # named volume — Splunk indexes and data persist here
